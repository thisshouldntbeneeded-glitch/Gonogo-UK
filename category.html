<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1">
<link rel="canonical" href="https://www.gonogo.co.uk/category">
<meta property="og:title" content="Brand Ratings by Industry — GoNoGo United Kingdom">

<meta name="twitter:title" content="Brand Ratings by Industry — GoNoGo United Kingdom">

<meta name="twitter:image" content="https://www.gonogo.co.uk/logos/og-share.jpg">
  <title>Brand Ratings by Industry — GoNoGo United Kingdom</title>
   <link rel="icon" href="favicon.ico" sizes="any">

  <script>(function(){var t=localStorage.getItem('gonogo_theme');if(t==='light'||(!t&&window.matchMedia('(prefers-color-scheme: light)').matches)){document.documentElement.classList.add('light-mode');}})();</script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div id="nav"></div>
  <div id="page-content">
    <div style="text-align:center;padding:var(--space-10);color:var(--text-muted)">Loading...</div>
  </div>
  <div id="footer"></div>
  <script src="data/data_partA.js"></script>
  <script src="data/data_partB.js"></script>
  <script src="data/data_partC.js"></script>
  <script src="data/data_partD.js"></script>
  <script src="data/data_partE.js"></script>
  <script src="data/data_partF.js"></script>
  <script src="data/data.js"></script>
  <script src="data/helpers.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="components.js"></script>
  <script src="api.js"></script>

  <script>
    var slug = Components.getParam('cat');
    document.getElementById('footer').innerHTML = Components.renderFooter();

    var CATEGORY_DESCRIPTIONS = {
      'Compliance': 'Regulatory adherence, licensing, legal standing, and industry standard compliance.',
      'Customer Satisfaction': 'User reviews, ratings, complaint resolution, and overall customer sentiment.',
      'Product Value': 'Quality of products/services relative to price, features, and market competitiveness.',
      'Innovation': 'Investment in new technology, service improvements, and forward-thinking initiatives.',
      'Customer Support': 'Responsiveness, availability, resolution quality, and support channel accessibility.',
      'Accessibility & Security': 'Ease of access across platforms, data protection, privacy practices, and inclusive design.',
      'Service Offering': 'Range, quality, and competitiveness of services provided to customers.',
      'Market Presence': 'Brand visibility, market share, and reputation within the industry.',
      'Digital Experience': 'Quality of online platforms, apps, and digital customer interactions.',
      'Transparency': 'Clarity of pricing, terms, and communication with customers.',
      'Sustainability': 'Environmental and social responsibility practices and commitments.'
    };

    function renderFrameworkHTML(scoringCategories) {
      return (scoringCategories || []).map(function(sc) {
        var pct = Math.round((Number(sc.max || 0) / 100) * 100);
        return '<div style="padding:var(--space-3) 0;border-bottom:1px solid var(--border-subtle)">' +
          '<div style="display:flex;align-items:center;gap:var(--space-3)">' +
            '<span style="font-size:var(--text-sm);font-weight:600;min-width:180px;color:var(--text-secondary)">' + sc.name + '</span>' +
            '<div class="score-bar" style="flex:1">' +
              '<div class="score-bar-fill" style="width:' + pct + '%;background:var(--green)"></div>' +
            '</div>' +
            '<span style="font-size:var(--text-sm);font-weight:700;font-variant-numeric:tabular-nums;min-width:40px;text-align:right;color:var(--text-primary)">' + sc.max + '%</span>' +
          '</div>' +
          (sc.description ? '<p style="font-size:var(--text-xs);color:var(--text-muted);margin-top:var(--space-1);margin-left:0;line-height:1.5">' + sc.description + '</p>' : '') +
        '</div>';
      }).join('');
    }

    (async function() {
      if (!slug) {
        // Show all categories grid
        document.getElementById('nav').innerHTML = Components.renderPublicNav('');
        document.title = 'All Industries — GoNoGo United Kingdom';
        var categories = await GoNoGoAPI.getCategoriesWithBrands();
        document.getElementById('page-content').innerHTML =
          '<section class="section"><div class="container">' +
            '<div class="section-header">' +
              '<h1 class="section-title">All Industries</h1>' +
              '<p class="section-subtitle">Browse ' + categories.length + ' United Kingdom industries</p>' +
            '</div>' +
            '<div class="industry-grid">' +
              categories.map(function(cat) {
                return '<a href="category.html?cat=' + cat.id + '" class="industry-card ' + (cat.hasBrands ? '' : 'no-data') + '">' +
                  '<i class="fa-solid ' + cat.icon + '" style="color:' + (cat.icon_color || 'var(--green)') + '"></i>' +
                  '<div class="name">' + cat.name + '</div>' +
                  '<div class="count">' + cat.brandCount + ' brand' + (cat.brandCount !== 1 ? 's' : '') + '</div>' +
                '</a>';
              }).join('') +
            '</div>' +
          '</div></section>';
      } else {
        // Load category data
        var allCats = await GoNoGoAPI.getCategories();
        var catInfo = null;
        for (var i = 0; i < allCats.length; i++) {
          if (allCats[i].id === slug) { catInfo = allCats[i]; break; }
        }

        if (!catInfo) {
          document.getElementById('nav').innerHTML = Components.renderPublicNav('');
          document.getElementById('page-content').innerHTML =
            '<section class="section"><div class="container" style="text-align:center">' +
              '<h1 class="section-title">Category Not Found</h1>' +
              '<p class="section-subtitle" style="margin-bottom:var(--space-6)">The category "' + slug + '" does not exist.</p>' +
              '<a href="index.html" class="btn btn-primary"><i class="fa-solid fa-house"></i> Back to Home</a>' +
            '</div></section>';
          return;
        }

        document.getElementById('nav').innerHTML = Components.renderPublicNav(slug);

        // === SEO: Dynamic meta tags for category pages ===
        var seoTitle = catInfo.name + ' Ratings & Reviews \u2014 GoNoGo United Kingdom';
        var catDesc = 'Compare ' + catInfo.brandCount + ' ' + catInfo.name.toLowerCase() + ' brands in the United Kingdom. Independent ' + catInfo.name.toLowerCase() + ' ratings using a transparent 100-point scoring framework on GoNoGo.';
        var canonicalUrl = 'https://www.gonogo.co.uk/category.html?cat=' + slug;

        document.title = seoTitle;

        function setMeta(attr, attrVal, content) {
          var el = document.querySelector('meta[' + attr + '="' + attrVal + '"]');
          if (!el) { el = document.createElement('meta'); el.setAttribute(attr, attrVal); document.head.appendChild(el); }
          el.content = content;
        }
        setMeta('name', 'description', catDesc);
        setMeta('name', 'keywords', catInfo.name + ' UK, ' + catInfo.name.toLowerCase() + ' ratings, ' + catInfo.name.toLowerCase() + ' comparison, best ' + catInfo.name.toLowerCase() + ' UK, GoNoGo ' + catInfo.name.toLowerCase());
        setMeta('property', 'og:title', seoTitle);
        setMeta('property', 'og:description', catDesc);
        setMeta('property', 'og:url', canonicalUrl);
        setMeta('name', 'twitter:title', seoTitle);
        setMeta('name', 'twitter:description', catDesc);

        var canonicalEl = document.querySelector('link[rel="canonical"]');
        if (canonicalEl) canonicalEl.href = canonicalUrl;

        // === SEO: JSON-LD structured data for category ===
        var catJsonLD = {
          '@context': 'https://schema.org',
          '@type': 'CollectionPage',
          'name': catInfo.name + ' Brand Ratings \u2014 GoNoGo United Kingdom',
          'description': catDesc,
          'url': canonicalUrl,
          'isPartOf': { '@type': 'WebSite', 'name': 'GoNoGo United Kingdom', 'url': 'https://www.gonogo.co.uk' },
          'about': { '@type': 'Thing', 'name': catInfo.name + ' in the United Kingdom' }
        };
        var catLdScript = document.createElement('script');
        catLdScript.type = 'application/ld+json';
        catLdScript.textContent = JSON.stringify(catJsonLD);
        document.head.appendChild(catLdScript);

        var brands = await GoNoGoAPI.getBrandsByCategory(slug);
        var currentSort = 'score-desc';

        window.sortBrands = function(key) {
          currentSort = key;
          if (key === 'score-desc') brands.sort(function(a, b) { return b.overallScore - a.overallScore; });
          else if (key === 'score-asc') brands.sort(function(a, b) { return a.overallScore - b.overallScore; });
          else if (key === 'name-asc') brands.sort(function(a, b) { return a.name.localeCompare(b.name); });
          else if (key === 'name-desc') brands.sort(function(a, b) { return b.name.localeCompare(a.name); });
          renderBrands();
        };

        function renderBrands() {
          var grid = document.getElementById('brand-grid');
          grid.innerHTML = brands.map(function(brand, i) { return Components.renderBrandCard(brand, i); }).join('');
          brands.forEach(function(brand) {
            Components.createRadarChart('radar-' + brand.id, brand, { showTicks: false, labelSize: 9, pointRadius: 2 });
          });
          document.querySelectorAll('.sort-btn').forEach(function(btn) {
            btn.classList.toggle('active', btn.dataset.sort === currentSort);
          });
        }

        // Use the category's own scoring from Supabase, enriched with descriptions
        var enrichedScoring = (catInfo.scoringCategories || []).map(function(sc) {
          return { name: sc.name, max: sc.max, description: sc.description || CATEGORY_DESCRIPTIONS[sc.name] || '' };
        });
        var frameworkHTML = renderFrameworkHTML(enrichedScoring);

        document.getElementById('page-content').innerHTML =
          '<section class="section-sm" style="border-bottom:1px solid var(--border-primary)"><div class="container">' +
            '<div style="display:flex;align-items:center;gap:var(--space-4);margin-bottom:var(--space-2)">' +
              '<a href="index.html" style="color:var(--text-muted);font-size:var(--text-sm)"><i class="fa-solid fa-arrow-left"></i> Home</a>' +
            '</div>' +
            '<div style="display:flex;align-items:center;gap:var(--space-4);margin-bottom:var(--space-4)">' +
              '<div style="width:56px;height:56px;border-radius:var(--radius-lg);background:var(--green-bg);border:1px solid var(--green-dim);display:flex;align-items:center;justify-content:center;font-size:var(--text-xl)">' +
                '<i class="fa-solid ' + catInfo.icon + '" style="color:' + (catInfo.icon_color || 'var(--green)') + '"></i>' +
              '</div>' +
              '<div>' +
                '<h1 style="font-size:var(--text-2xl);font-weight:800;letter-spacing:-0.02em">' + catInfo.name + '</h1>' +
                '<p style="font-size:var(--text-sm);color:var(--text-secondary)">' + brands.length + ' brand' + (brands.length !== 1 ? 's' : '') + ' reviewed</p>' +
              '</div>' +
            '</div>' +
          '</div></section>' +
          '<section class="section-sm" style="background:var(--surface-1);border-bottom:1px solid var(--border-primary)"><div class="container">' +
            '<h2 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4)">Scoring Framework</h2>' +
            '<p style="font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--space-4)">Each ' + catInfo.name.toLowerCase() + ' brand is scored out of 100 across these weighted categories:</p>' +
            '<div style="max-width:600px">' + frameworkHTML + '</div>' +
          '</div></section>' +
          '<section class="section"><div class="container">' +
            '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--space-3);margin-bottom:var(--space-6)">' +
              '<h2 style="font-size:var(--text-lg);font-weight:700">All Brands</h2>' +
              '<div class="filter-pills">' +
                '<button class="filter-pill sort-btn active" data-sort="score-desc" onclick="sortBrands(\'score-desc\')"><i class="fa-solid fa-arrow-down-wide-short"></i> Score ↓</button>' +
                '<button class="filter-pill sort-btn" data-sort="score-asc" onclick="sortBrands(\'score-asc\')"><i class="fa-solid fa-arrow-up-wide-short"></i> Score ↑</button>' +
                '<button class="filter-pill sort-btn" data-sort="name-asc" onclick="sortBrands(\'name-asc\')"><i class="fa-solid fa-arrow-down-a-z"></i> Name A–Z</button>' +
                '<button class="filter-pill sort-btn" data-sort="name-desc" onclick="sortBrands(\'name-desc\')"><i class="fa-solid fa-arrow-up-z-a"></i> Name Z–A</button>' +
              '</div>' +
            '</div>' +
            '<div class="brand-grid" id="brand-grid"></div>' +
          '</div></section>';

        renderBrands();
      }
    })();
  </script>
</body>
</html>
