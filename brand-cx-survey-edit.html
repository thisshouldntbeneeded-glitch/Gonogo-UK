}

// ---------------- Embed Studio (Phase 2A) ----------------
// Tabs: Style / Triggers / Targeting / Code
// Live preview iframe runs the real widget against the current config.
function renderEmbedStudio(mount, url, token, label, widgetSrc) {
  var origin = location.origin;
  // Use clean URL to avoid 308 redirect (which trips frame-ancestors before the final response is reached)
  var previewUrl = origin + '/cx-embed-preview';

  // Defaults — must match cx-widget.js defaults
  var defaults = {
    mode: 'tab', position: 'right', vertical: 'middle',
    label: label || 'Feedback', icon: 'chat',
    color: '#11a551', textColor: '#ffffff',
    radius: 8, size: 'md', pulse: false, ping: false, tooltip: '',
    trigger: 'manual', delay: 0, scroll: 50, selector: '',
    frequency: 'always', include: '*', exclude: '', sample: 100,
    animation: 'slide', closable: true
  };
  var saved = (typeof _survey !== 'undefined' && _survey && _survey.embed_config && typeof _survey.embed_config === 'object') ? _survey.embed_config : {};
  var cfg = Object.assign({}, defaults);
  Object.keys(defaults).forEach(function(k){
    if (Object.prototype.hasOwnProperty.call(saved, k) && saved[k] !== null && saved[k] !== undefined) {
      cfg[k] = saved[k];
    }
  });
  window._embedCfg = cfg;

  var TABS = [
    { id: 'style',    label: 'Style',     icon: 'fa-palette' },
    { id: 'triggers', label: 'Triggers',  icon: 'fa-bolt' },
    { id: 'target',   label: 'Targeting', icon: 'fa-bullseye' },
    { id: 'code',     label: 'Code',      icon: 'fa-code' }
  ];

  function esc(s){ return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // --- Build shell ---
  var html = '';
  html += '<div class="se-embed-studio" style="display:grid;grid-template-columns:minmax(280px,360px) 1fr;gap:14px;align-items:stretch">';

  // LEFT: tabs + panels
  html += '<div class="es-left" style="border:1px solid var(--border-primary);border-radius:10px;background:var(--bg-elev,#fafafa);overflow:hidden">';
  html += '<div class="es-tabs" role="tablist" style="display:flex;border-bottom:1px solid var(--border-primary);background:var(--surface-1,#fff)">';
  TABS.forEach(function(t, i){
    html += '<button type="button" class="es-tab" data-tab="' + t.id + '" role="tab" aria-selected="' + (i===0?'true':'false') + '" style="flex:1;padding:10px 6px;border:0;background:transparent;cursor:pointer;font-size:12px;color:var(--text-muted);border-bottom:2px solid transparent;' + (i===0 ? 'color:var(--text-primary);border-bottom-color:var(--accent,#11a551);font-weight:600;background:var(--bg-elev,#fafafa);' : '') + '"><i class="fa-solid ' + t.icon + '"></i> ' + t.label + '</button>';
  });
  html += '</div>';
  html += '<div class="es-panels" style="padding:12px">';
  TABS.forEach(function(t, i){
    html += '<div class="es-panel" data-panel="' + t.id + '" role="tabpanel" style="' + (i===0 ? '' : 'display:none;') + '"></div>';
  });
  html += '</div>';
  html += '<div style="display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border-primary);background:var(--surface-1,#fff)">';
  html += '<button type="button" class="se-btn-secondary" data-es-reset style="flex:1"><i class="fa-solid fa-rotate-left"></i> Reset</button>';
  html += '<button type="button" class="se-btn-secondary" data-es-open style="flex:1"><i class="fa-solid fa-eye"></i> Open in preview</button>';
  html += '</div>';
  html += '</div>';

  // RIGHT: preview
  html += '<div class="es-right" style="border:1px solid var(--border-primary);border-radius:10px;background:#0f172a;overflow:hidden;display:flex;flex-direction:column;min-height:520px">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#1e293b;color:#cbd5e1;font-size:12px">';
  html += '<span><i class="fa-solid fa-circle" style="color:#ef4444;font-size:8px"></i> <i class="fa-solid fa-circle" style="color:#f59e0b;font-size:8px;margin:0 4px"></i> <i class="fa-solid fa-circle" style="color:#10b981;font-size:8px"></i> &nbsp;Live preview</span>';
  html += '<span style="display:inline-flex;gap:4px">';
  html += '<button type="button" class="es-dev" data-dev="desktop" aria-pressed="true" style="background:#334155;border:0;color:#fff;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:11px"><i class="fa-solid fa-desktop"></i> Desktop</button>';
  html += '<button type="button" class="es-dev" data-dev="mobile" aria-pressed="false" style="background:transparent;border:1px solid #334155;color:#cbd5e1;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:11px"><i class="fa-solid fa-mobile-screen"></i> Mobile</button>';
  html += '</span>';
  html += '</div>';
  html += '<div class="es-stage" style="flex:1;display:flex;align-items:stretch;justify-content:center;padding:14px;background:repeating-linear-gradient(45deg,#0b1220,#0b1220 10px,#0f172a 10px,#0f172a 20px);overflow:auto">';
  html += '<iframe data-es-frame src="' + esc(previewUrl) + '" title="Embed preview" style="width:100%;max-width:100%;height:100%;min-height:480px;border:0;border-radius:8px;background:#fff;transition:max-width .25s ease"></iframe>';
  html += '</div>';
  html += '</div>';

  html += '</div>'; // /.se-embed-studio

  mount.innerHTML = html;

  // --- Panel builders ---
  function field(labelTxt, inputHtml, hint){
    return '<label style="display:flex;flex-direction:column;font-size:11px;color:var(--text-muted);gap:4px">' + esc(labelTxt) + inputHtml + (hint ? '<span style="font-size:10px;color:var(--text-muted);opacity:.75">' + esc(hint) + '</span>' : '') + '</label>';
  }
  function sel(key, opts){
    var o = opts.map(function(p){ return '<option value="' + esc(p.v) + '"' + (String(cfg[key])===String(p.v) ? ' selected' : '') + '>' + esc(p.l) + '</option>'; }).join('');
    return '<select class="se-input" data-cfg="' + key + '">' + o + '</select>';
  }
  function inp(key, type, extra){
    return '<input class="se-input" type="' + (type||'text') + '" data-cfg="' + key + '" value="' + esc(cfg[key]) + '"' + (extra||'') + '>';
  }
  function chk(key, txt){
    return '<label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-primary);cursor:pointer"><input type="checkbox" data-cfg="' + key + '"' + (cfg[key] ? ' checked' : '') + '> ' + esc(txt) + '</label>';
  }
  function grid2(inner){ return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">' + inner + '</div>'; }

  function buildStylePanel(){
    var h = '';
    h += grid2(
      field('Style', sel('mode', [
        {v:'tab',l:'Side tab'},{v:'bubble',l:'Floating bubble'},{v:'inline',l:'Inline (no launcher)'},{v:'modal',l:'Modal popup'}
      ])) +
      field('Icon', sel('icon', [
        {v:'chat',l:'Chat'},{v:'star',l:'Star'},{v:'smiley',l:'Smiley'},{v:'megaphone',l:'Megaphone'},{v:'none',l:'No icon'}
      ]))
    );
    h += '<div style="height:8px"></div>';
    h += grid2(
      field('Position', sel('position', [
        {v:'right',l:'Right edge'},{v:'left',l:'Left edge'},{v:'bottom-right',l:'Bottom right'},{v:'bottom-left',l:'Bottom left'}
      ])) +
      field('Vertical alignment', sel('vertical', [
        {v:'top',l:'Top'},{v:'middle',l:'Middle'},{v:'bottom',l:'Bottom'}
      ]))
    );
    h += '<div style="height:8px"></div>';
    h += field('Label', inp('label'));
    h += '<div style="height:8px"></div>';
    h += field('Tooltip (hover hint)', inp('tooltip', 'text', ' placeholder="e.g. Share your feedback"'));
    h += '<div style="height:8px"></div>';
    h += grid2(
      field('Background colour', inp('color','color')) +
      field('Text colour', inp('textColor','color'))
    );
    h += '<div style="height:8px"></div>';
    h += grid2(
      field('Size', sel('size', [{v:'sm',l:'Small'},{v:'md',l:'Medium'},{v:'lg',l:'Large'}])) +
      field('Corner radius (px)', inp('radius','number',' min="0" max="40"'))
    );
    h += '<div style="height:8px"></div>';
    h += grid2(
      field('Animation', sel('animation', [{v:'slide',l:'Slide'},{v:'fade',l:'Fade'},{v:'scale',l:'Scale'}])) +
      '<div style="display:flex;flex-direction:column;gap:6px;justify-content:flex-end">' + chk('pulse','Pulse highlight') + chk('ping','Attention ping') + chk('closable','Closable by user') + '</div>'
    );
    return h;
  }

  function buildTriggersPanel(){
    var h = '';
    h += field('When should the survey appear?', sel('trigger', [
      {v:'manual',l:'Manual — only when user clicks launcher'},
      {v:'time',l:'After a time delay'},
      {v:'scroll',l:'After scroll depth'},
      {v:'exit_intent',l:'On exit intent (cursor leaves page)'},
      {v:'click',l:'On click of a CSS selector'}
    ]));
    h += '<div style="height:10px"></div>';
    h += '<div data-trigger-extra></div>';
    h += '<div style="height:14px"></div>';
    h += field('How often should it show?', sel('frequency', [
      {v:'always',l:'Always — every page view'},
      {v:'session',l:'Once per session'},
      {v:'day',l:'Once per day'},
      {v:'week',l:'Once per week'},
      {v:'once_dismissed',l:'Until the user dismisses it'},
      {v:'once_submitted',l:'Until the user submits feedback'}
    ]));
    return h;
  }

  function buildTriggerExtra(){
    var t = cfg.trigger;
    if (t === 'time')   return field('Delay (seconds)', inp('delay','number',' min="0" max="600"'), 'Survey opens this many seconds after page load.');
    if (t === 'scroll') return field('Scroll depth (%)', inp('scroll','number',' min="0" max="100"'), 'Opens when the user scrolls past this share of the page.');
    if (t === 'click')  return field('CSS selector', inp('selector','text',' placeholder="#feedback-btn, .help-link"'), 'Opens when a matching element is clicked.');
    if (t === 'exit_intent') return '<div style="font-size:12px;color:var(--text-muted)">Opens once when the cursor moves toward the top of the page.</div>';
    return '<div style="font-size:12px;color:var(--text-muted)">No extra settings — the user opens the survey by clicking the launcher.</div>';
  }

  function buildTargetPanel(){
    var h = '';
    h += field('Show on these URLs', inp('include','text',' placeholder="* or /pricing*, /checkout*"'), 'Comma-separated patterns. Use * as wildcard. Leave * to show everywhere.');
    h += '<div style="height:8px"></div>';
    h += field('Hide on these URLs', inp('exclude','text',' placeholder="/admin*, /login"'), 'Comma-separated patterns. Use * as wildcard.');
    h += '<div style="height:8px"></div>';
    h += field('Visitor sample (%)', inp('sample','number',' min="1" max="100"'), 'Only this share of visitors will see the widget. Use 100 for everyone.');
    return h;
  }

  function buildCodePanel(){
    var h = '';
    h += '<label style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:4px">Widget code (paste before <code>&lt;/body&gt;</code>)</label>';
    h += '<textarea class="se-input" data-es-code readonly style="width:100%;min-height:140px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px"></textarea>';
    h += '<div style="display:flex;gap:8px;margin-top:6px">';
    h += '<button type="button" class="se-btn-secondary" data-es-copy style="flex:1"><i class="fa-solid fa-copy"></i> Copy code</button>';
    h += '</div>';
    h += '<div style="margin-top:10px;font-size:11px;color:var(--text-muted)">The same script tag drives every style — change anything in the other tabs and the snippet here updates automatically.</div>';
    return h;
  }

  // --- Code generation ---
  function buildCode(){
    var attrs = [];
    function add(k, v){ if (v == null || v === '') return; attrs.push('data-' + k + '="' + String(v).replace(/"/g,'&quot;') + '"'); }
    add('token', token);
    add('mode', cfg.mode);
    add('position', cfg.position);
    add('vertical', cfg.vertical);
    add('label', cfg.label);
    add('icon', cfg.icon);
    add('color', cfg.color);
    add('text-color', cfg.textColor);
    if (Number(cfg.radius) !== defaults.radius) add('radius', cfg.radius);
    if (cfg.size !== defaults.size) add('size', cfg.size);
    if (cfg.pulse) add('pulse','true');
    if (cfg.ping) add('ping','true');
    if (cfg.tooltip) add('tooltip', cfg.tooltip);
    add('trigger', cfg.trigger);
    if (cfg.trigger === 'time') add('delay', cfg.delay);
    if (cfg.trigger === 'scroll') add('scroll', cfg.scroll);
    if (cfg.trigger === 'click' && cfg.selector) add('selector', cfg.selector);
    add('frequency', cfg.frequency);
    if (cfg.include && cfg.include !== '*') add('include', cfg.include);
    if (cfg.exclude) add('exclude', cfg.exclude);
    if (Number(cfg.sample) !== 100) add('sample', cfg.sample);
    if (cfg.animation !== defaults.animation) add('animation', cfg.animation);
    if (cfg.closable === false) add('closable','false');
    if (cfg.mode === 'inline') add('target','#gonogo-cx');
    var code = '<script src="' + widgetSrc + '" ' + attrs.join(' ') + ' defer><' + '/script>';
    if (cfg.mode === 'inline') code = '<div id="gonogo-cx"></div>\n' + code;
    return code;
  }

  // --- Preview wiring ---
  var frame = mount.querySelector('[data-es-frame]');
  var previewReady = false;
  var pendingLoad = null;
  function postToPreview(msg){
    try { frame.contentWindow.postMessage(msg, '*'); } catch(_) {}
  }
  function pushPreview(){
    var payload = { src: widgetSrc, data: {
      token: token, mode: cfg.mode, position: cfg.position, vertical: cfg.vertical,
      label: cfg.label, icon: cfg.icon, color: cfg.color, 'text-color': cfg.textColor,
      radius: cfg.radius, size: cfg.size,
      pulse: cfg.pulse ? 'true' : 'false', ping: cfg.ping ? 'true' : 'false',
      tooltip: cfg.tooltip,
      trigger: cfg.trigger, delay: cfg.delay, scroll: cfg.scroll, selector: cfg.selector,
      frequency: cfg.frequency, include: cfg.include, exclude: cfg.exclude, sample: cfg.sample,
      animation: cfg.animation, closable: cfg.closable ? 'true' : 'false',
      target: cfg.mode === 'inline' ? '#gonogo-cx' : ''
    }};
    if (previewReady) postToPreview({ type: 'gng:preview:load', payload: payload });
    else pendingLoad = payload;
  }
  window.addEventListener('message', function(e){
    var d = e.data || {};
    if (d && d.type === 'gng:preview:ready') {
      previewReady = true;
      if (pendingLoad) { postToPreview({ type: 'gng:preview:load', payload: pendingLoad }); pendingLoad = null; }
    }
  });

  // --- Render & rebind ---
  function renderPanels(){
    mount.querySelector('[data-panel="style"]').innerHTML    = buildStylePanel();
    mount.querySelector('[data-panel="triggers"]').innerHTML = buildTriggersPanel();
    mount.querySelector('[data-panel="target"]').innerHTML   = buildTargetPanel();
    mount.querySelector('[data-panel="code"]').innerHTML     = buildCodePanel();
    var extra = mount.querySelector('[data-trigger-extra]');
    if (extra) extra.innerHTML = buildTriggerExtra();
    var ta = mount.querySelector('[data-es-code]');
    if (ta) ta.value = buildCode();
    bindInputs();
  }
  function bindInputs(){
    mount.querySelectorAll('[data-cfg]').forEach(function(el){
      var key = el.dataset.cfg;
      var handler = function(){
        var v;
        if (el.type === 'checkbox') v = el.checked;
        else if (el.type === 'number') v = el.value === '' ? '' : Number(el.value);
        else v = el.value;
        cfg[key] = v;
        // re-render the trigger-extra block if trigger changed
        if (key === 'trigger') {
          var extra = mount.querySelector('[data-trigger-extra]');
          if (extra) { extra.innerHTML = buildTriggerExtra(); bindInputs(); }
        }
        var ta = mount.querySelector('[data-es-code]');
        if (ta) ta.value = buildCode();
        pushPreview();
      };
      el.addEventListener('input', handler);
      el.addEventListener('change', handler);
    });
  }

  // --- Tab switching ---
  mount.querySelectorAll('[data-tab]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var id = btn.dataset.tab;
      mount.querySelectorAll('[data-tab]').forEach(function(b){
        var active = b.dataset.tab === id;
        b.setAttribute('aria-selected', active ? 'true' : 'false');
        b.style.color = active ? 'var(--text-primary)' : 'var(--text-muted)';
        b.style.borderBottomColor = active ? 'var(--accent,#11a551)' : 'transparent';
        b.style.fontWeight = active ? '600' : '';
        b.style.background = active ? 'var(--bg-elev,#fafafa)' : 'transparent';
      });
      mount.querySelectorAll('[data-panel]').forEach(function(p){
        p.style.display = p.dataset.panel === id ? '' : 'none';
      });
    });
  });

  // --- Device toggle ---
  mount.querySelectorAll('.es-dev').forEach(function(btn){
    btn.addEventListener('click', function(){
      var dev = btn.dataset.dev;
      mount.querySelectorAll('.es-dev').forEach(function(b){
        var on = b === btn;
        b.setAttribute('aria-pressed', on ? 'true' : 'false');
        b.style.background = on ? '#334155' : 'transparent';
        b.style.border = on ? '0' : '1px solid #334155';
        b.style.color = on ? '#fff' : '#cbd5e1';
      });
      frame.style.maxWidth = (dev === 'mobile') ? '390px' : '100%';
    });
  });

  // --- Reset & open ---
  var resetBtn = mount.querySelector('[data-es-reset]');
  if (resetBtn) resetBtn.addEventListener('click', function(){
    Object.keys(cfg).forEach(function(k){ delete cfg[k]; });
    Object.assign(cfg, defaults);
    renderPanels();
    pushPreview();
  });
  var openBtn = mount.querySelector('[data-es-open]');
  if (openBtn) openBtn.addEventListener('click', function(){
    postToPreview({ type: 'gng:preview:open' });
  });

  // --- Copy ---
  mount.addEventListener('click', function(e){
    var t = e.target.closest('[data-es-copy]');
    if (!t) return;
    var ta = mount.querySelector('[data-es-code]');
    if (!ta) return;
    try { navigator.clipboard.writeText(ta.value); } catch(_){}
    var old = t.innerHTML;
    t.innerHTML = '<i class="fa-solid fa-check"></i> Copied';
    setTimeout(function(){ t.innerHTML = old; }, 1400);
  });

  // Initial render + push
  renderPanels();
  pushPreview();
}

async function createLink() {
  if (!_survey || !_survey.id) {
    toast('Save the survey first', 'error');
    return;
  }

  var s = _survey.status;
  if (s !== 'active') {
    if (!confirm('Survey is not published — links will not accept responses until you publish. Continue?')) return;
  }

  var label = document.getElementById('f-link-label').value.trim();

  try {
    await GoNoGoAPI.cx.createLink(_survey.id, label);
    document.getElementById('f-link-label').value = '';
    var data = await GoNoGoAPI.cx.getSurvey(_survey.id);
    _links = data.links || [];
    renderLinks();
    toast('Link created', 'success');
  } catch(e) {
    toast('Could not create link: ' + (e.message || 'error'), 'error');
  }
}

function getEnabledExtraLangs() {
  // The default language (s-language) is the one questions are authored in — do not translate it.
  var def = (document.getElementById('s-language') && document.getElementById('s-language').value) || (_survey && _survey.language) || 'en';
  var enabled = (_survey && Array.isArray(_survey.languages)) ? _survey.languages.filter(function(l){ return l.enabled; }).map(function(l){ return l.code; }) : [];
  // Codes in _survey.languages are full codes like 'zu-ZA'; reduce to short codes ('zu') to match I18N runtime.
  var short = enabled.map(function(c){ return (c || '').split('-')[0]; });
  // De-dupe and drop the default.
  var seen = {}; var out = [];
  short.forEach(function(c){ if (c && c !== def && !seen[c]) { seen[c] = 1; out.push(c); } });
  return { def: def, extras: out };
}

function langDisplayName(code) {
  var m = SA_LANGUAGES.find(function(l){ return l.code.split('-')[0] === code; });
  return m ? (m.name + ' (' + m.native + ')') : code;
}

function ensureI18nShape() {
  if (!_i18n || typeof _i18n !== 'object') _i18n = {};
  if (!_i18n.ui || typeof _i18n.ui !== 'object') _i18n.ui = {};
  if (!Array.isArray(_i18n.questions)) _i18n.questions = [];
  // Keep questions array length in sync with _questions length
  while (_i18n.questions.length < _questions.length) _i18n.questions.push({});
  if (_i18n.questions.length > _questions.length) _i18n.questions.length = _questions.length;
}

function renderTranslationsPanel() {
  var panel = document.getElementById('panel-translations');
  if (!panel) return;
  ensureI18nShape();

  var meta = getEnabledExtraLangs();
  var extras = meta.extras;

  var html = '<div class="se-panel-intro"><div><h2>Translations</h2><p>Provide translated text for each enabled language. The default authoring language is <strong>' + esc(langDisplayName(meta.def)) + '</strong> — enable extra languages in <em>Survey settings → Launch languages</em>.</p></div></div>';

  if (!extras.length) {
    html += '<div class="se-empty" style="padding:24px;border:1px dashed var(--border-primary);border-radius:8px;text-align:center">' +
            '<div class="se-empty-icon"><i class="fa-solid fa-language"></i></div>' +
            '<h3 style="margin:8px 0 4px">No extra languages enabled yet</h3>' +
            '<p style="color:var(--text-muted);font-size:13px">Open <strong>Survey settings → Launch languages</strong> and tick at least one language other than your default to start translating.</p>' +
            '</div>';
    panel.innerHTML = html;
    return;
  }

  if (!_questions.length) {
    html += '<div class="se-empty" style="padding:24px;border:1px dashed var(--border-primary);border-radius:8px;text-align:center"><p style="color:var(--text-muted);font-size:13px">Add some questions on the <strong>Question</strong> tab first, then come back here to translate them.</p></div>';
    panel.innerHTML = html;
    return;
  }

  // Tabs to switch between extra languages
  html += '<div class="se-tabs" style="margin-bottom:12px">';
  extras.forEach(function(code, i){
    html += '<button type="button" class="se-tab' + (i===0?' active':'') + '" data-tr-langtab="' + esc(code) + '">' + esc(langDisplayName(code)) + '</button>';
  });
  html += '</div>';

  extras.forEach(function(code, i){
    html += '<div data-tr-pane="' + esc(code) + '" style="display:' + (i===0?'block':'none') + '">';
    html += renderTranslationsForLang(code);
    html += '</div>';
  });

  panel.innerHTML = html;

  // Tab switching
  panel.querySelectorAll('[data-tr-langtab]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var code = btn.dataset.trLangtab;
      panel.querySelectorAll('[data-tr-langtab]').forEach(function(b){ b.classList.toggle('active', b===btn); });
      panel.querySelectorAll('[data-tr-pane]').forEach(function(p){ p.style.display = (p.dataset.trPane === code) ? 'block' : 'none'; });
    });
  });

  // Wire inputs
  panel.querySelectorAll('[data-tr-q-field]').forEach(function(el){
    el.addEventListener('input', function(){
      var code = el.dataset.trLang;
      var idx = parseInt(el.dataset.trQIdx, 10);
      var field = el.dataset.trQField;
      ensureI18nShape();
      if (!_i18n.questions[idx]) _i18n.questions[idx] = {};
      if (!_i18n.questions[idx][code]) _i18n.questions[idx][code] = {};
      _i18n.questions[idx][code][field] = el.value;
      markDirty();
    });
  });
  panel.querySelectorAll('[data-tr-q-opt]').forEach(function(el){
    el.addEventListener('input', function(){
      var code = el.dataset.trLang;
      var idx = parseInt(el.dataset.trQIdx, 10);
      var oi = parseInt(el.dataset.trQOpt, 10);
      ensureI18nShape();
      if (!_i18n.questions[idx]) _i18n.questions[idx] = {};
      if (!_i18n.questions[idx][code]) _i18n.questions[idx][code] = {};
      if (!Array.isArray(_i18n.questions[idx][code].options)) _i18n.questions[idx][code].options = [];
      _i18n.questions[idx][code].options[oi] = el.value;
      markDirty();
    });
  });
  panel.querySelectorAll('[data-tr-survey-field]').forEach(function(el){
    el.addEventListener('input', function(){
      var code = el.dataset.trLang;
      var field = el.dataset.trSurveyField;
      ensureI18nShape();
      if (!_i18n.survey) _i18n.survey = {};
      if (!_i18n.survey[code]) _i18n.survey[code] = {};
      _i18n.survey[code][field] = el.value;
      markDirty();
    });
  });
  panel.querySelectorAll('[data-tr-ui]').forEach(function(el){
    el.addEventListener('input', function(){
      var code = el.dataset.trLang;
      var key = el.dataset.trUi;
      ensureI18nShape();
      if (!_i18n.ui[code]) _i18n.ui[code] = {};
      _i18n.ui[code][key] = el.value;
      markDirty();
    });
  });
}

function renderTranslationsForLang(code) {

  var introTitle = (_survey && _survey.intro_title) || '';

  var tyTitle = (_survey && _survey.thank_you_title) || 'Thank you';
  var tyText = (_survey && _survey.thank_you_text) || 'Your feedback has been received.';

  var html = '';

  // Survey-level texts
  html += '<div class="se-settings-section active" style="display:block;margin-bottom:18px">';
  html += '<h4 class="se-section-h" style="margin-top:0">Intro & thank-you copy</h4>';
  html += '<div class="se-field"><label class="se-label">Intro title — original</label><input class="se-input" value="' + esc(introTitle) + '" disabled style="opacity:.6"></div>';

  html += '<div class="se-field"><label class="se-label">Intro text — original</label><textarea class="se-textarea" disabled style="opacity:.6">' + esc(introText) + '</textarea></div>';
  html += '<div class="se-field"><label class="se-label">Intro text — ' + esc(code) + '</label><textarea class="se-textarea" data-tr-survey-field="intro_text" data-tr-lang="' + esc(code) + '" placeholder="Translate the intro text">' + esc(sTr.intro_text || '') + '</textarea></div>';
  html += '<div class="se-row">';
  html += '<div class="se-field"><label class="se-label">Thank-you title — original</label><input class="se-input" value="' + esc(tyTitle) + '" disabled style="opacity:.6"></div>';
  html += '<div class="se-field"><label class="se-label">Thank-you title — ' + esc(code) + '</label><input class="se-input" data-tr-survey-field="thank_you_title" data-tr-lang="' + esc(code) + '" value="' + esc(sTr.thank_you_title || '') + '" placeholder="Translate"></div>';
  html += '</div>';
  html += '<div class="se-row">';
  html += '<div class="se-field"><label class="se-label">Thank-you text — original</label><input class="se-input" value="' + esc(tyText) + '" disabled style="opacity:.6"></div>';
  html += '<div class="se-field"><label class="se-label">Thank-you text — ' + esc(code) + '</label><input class="se-input" data-tr-survey-field="thank_you_text" data-tr-lang="' + esc(code) + '" value="' + esc(sTr.thank_you_text || '') + '" placeholder="Translate"></div>';
  html += '</div>';
  html += '</div>';

  // UI labels
  html += '<details class="se-settings-section active" style="display:block;margin-bottom:18px;border:1px solid var(--border-primary);border-radius:8px;padding:12px 14px">';
  html += '<summary style="cursor:pointer;font-weight:600;font-size:13px">UI label overrides (Start / Back / Next / Submit …)</summary>';
  html += '<p style="margin:8px 0 6px;color:var(--text-muted);font-size:12px">Optional. Leave blank to use the built-in translation. Only fill what you want to override.</p>';
  UI_LABEL_KEYS.forEach(function(item){
    html += '<div class="se-row">';
    html += '<div class="se-field"><label class="se-label">' + esc(item.label) + '</label><input class="se-input" data-tr-ui="' + esc(item.k) + '" data-tr-lang="' + esc(code) + '" placeholder="' + esc(item.placeholder) + '" value="' + esc(uTr[item.k] || '') + '"></div>';
    html += '</div>';
  });
  html += '</details>';

  // Questions
  html += '<h4 class="se-section-h">Questions</h4>';
  _questions.forEach(function(q, idx){
    var qTr = (t[idx] && t[idx][code]) || {};
    var opts = Array.isArray(q.options) ? q.options : [];
    html += '<div class="se-settings-section active" style="display:block;margin-bottom:14px;border:1px solid var(--border-primary);border-radius:8px;padding:12px 14px">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><strong style="font-size:12px;color:var(--text-muted)">Q' + (idx+1) + ' · ' + esc(q.qtype) + '</strong></div>';
    html += '<div class="se-field"><label class="se-label">Prompt — original</label><textarea class="se-textarea" disabled style="opacity:.6;min-height:46px">' + esc(q.prompt || '') + '</textarea></div>';
    html += '<div class="se-field"><label class="se-label">Prompt — ' + esc(code) + '</label><textarea class="se-textarea" data-tr-q-field="prompt" data-tr-q-idx="' + idx + '" data-tr-lang="' + esc(code) + '" placeholder="Translate the prompt" style="min-height:46px">' + esc(qTr.prompt || '') + '</textarea></div>';
    if (q.help_text) {
      html += '<div class="se-field"><label class="se-label">Help text — original</label><input class="se-input" value="' + esc(q.help_text) + '" disabled style="opacity:.6"></div>';
      html += '<div class="se-field"><label class="se-label">Help text — ' + esc(code) + '</label><input class="se-input" data-tr-q-field="help_text" data-tr-q-idx="' + idx + '" data-tr-lang="' + esc(code) + '" value="' + esc(qTr.help_text || '') + '" placeholder="Translate the help text"></div>';
    }
    if (['single_select','multi_select','dropdown','yes_no','consent'].indexOf(q.qtype) !== -1 && opts.length) {
      html += '<div class="se-field"><label class="se-label">Options</label>';
      opts.forEach(function(opt, oi){
        var trVal = (Array.isArray(qTr.options) && qTr.options[oi]) || '';
        html += '<div class="se-row" style="margin-top:4px">';
        html += '<div class="se-field"><input class="se-input" value="' + esc(opt) + '" disabled style="opacity:.6"></div>';
        html += '<div class="se-field"><input class="se-input" data-tr-q-opt="' + oi + '" data-tr-q-idx="' + idx + '" data-tr-lang="' + esc(code) + '" value="' + esc(trVal) + '" placeholder="Translate option"></div>';
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
  });

  return html;
}

}

function syncQuestionsFromDOM() {
  // Safety net: pull latest values directly from the live DOM for each question card
  // so that typed-but-unblurred text is captured at save time.
  var panel = document.getElementById('panel-question');
  if (!panel) return;
  panel.querySelectorAll('.se-flow-card[data-idx]').forEach(function(card){
    var idx = Number(card.dataset.idx);
    var q = _questions[idx];
    if (!q) return;
    var promptEl = card.querySelector('textarea[data-field="prompt"]');
    var helpEl = card.querySelector('textarea[data-field="help_text"]');
    var reqEl = card.querySelector('input[data-field="required"]');
    var phEl = card.querySelector('input[data-field="placeholder"]');
    if (promptEl) q.prompt = promptEl.value;
    if (helpEl) q.help_text = helpEl.value;
    if (reqEl) q.required = !!reqEl.checked;
    if (phEl) q.options = [phEl.value || ''];
  });
}

async function save() {
  syncQuestionsFromDOM();

  var name = document.getElementById('s-name').value.trim();
  if (!name) {
    toast('Survey name is required', 'error');
    showTab('settings');
    document.getElementById('s-name').focus();
    return;
  }

  if (!_questions.length) {
    toast('Add at least one question', 'error');
    return;
  }

  for (var i = 0; i < _questions.length; i++) {
    if (!_questions[i].prompt || !_questions[i].prompt.trim()) {
      toast('Question ' + (i + 1) + ' needs a prompt', 'error');
      _selectedIdx = i;
      renderRail();
      renderQuestionPanel();
      showTab('question');
      return;
    }

    if (
      (_questions[i].qtype === 'single_select' || _questions[i].qtype === 'multi_select' || _questions[i].qtype === 'dropdown') &&
      (!_questions[i].options || _questions[i].options.filter(Boolean).length < 2)
    ) {
      toast('Question ' + (i + 1) + ' needs at least 2 options', 'error');
      _selectedIdx = i;
      renderRail();
      renderQuestionPanel();
      showTab('question');
      return;
    }
  }

  var btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving…';
  _saving = true;

  try {
    var retentionVal = document.getElementById('s-contact-retention').value.trim();

    var payload = {
      id: _survey ? _survey.id : null,
      name: name,
      slug: document.getElementById('s-slug').value.trim() || null,
      intro_title: document.getElementById('s-intro-title').value.trim(),
      intro_text: document.getElementById('s-intro-text').value.trim(),
      thank_you_title: document.getElementById('s-ty-title').value.trim(),
      thank_you_text: document.getElementById('s-ty-text').value.trim(),
      is_anonymous: document.getElementById('s-anon').checked,
      allow_contact_capture: document.getElementById('s-contact').checked,

      status: (function(){
        var v = _survey ? _survey.status : 'draft';
        return ['draft','active','paused','archived'].indexOf(v) !== -1 ? v : 'draft';
      })(),

      template_key: document.getElementById('s-template-key').value || null,
      brand_logo_url: document.getElementById('s-brand-logo').value.trim() || null,
      brand_primary_color: document.getElementById('s-brand-primary').value.trim() || null,
      brand_accent_color: document.getElementById('s-brand-accent').value.trim() || null,
      language: (document.getElementById('s-language') && document.getElementById('s-language').value) || 'en',

      theme_variant: document.getElementById('s-theme-variant').value || 'classic',
      progress_style: document.getElementById('s-progress-style').value || 'bar',
      show_progress_bar: document.getElementById('s-show-progress').checked,
      party_mode_default: !!document.getElementById('s-party-default').checked,

      privacy_notice_text: document.getElementById('s-privacy-notice').value.trim() || null,
      marketing_consent_enabled: document.getElementById('s-marketing-consent').checked,
      marketing_consent_label: document.getElementById('s-marketing-label').value.trim() || null,
      contact_retention_days: retentionVal ? parseInt(retentionVal, 10) : null,

      questions: _questions.map(function(q){
        return {
          qtype: q.qtype,
          prompt: (q.prompt || '').trim(),
          help_text: (q.help_text || '').trim(),
          required: !!q.required,
          options: Array.isArray(q.options) ? q.options : [],
          logic: Array.isArray(q.logic) ? q.logic : [],
          formatting: (q.formatting && typeof q.formatting === 'object') ? q.formatting : {},
          image_url: q.image_url || null
        };
      }).filter(function(q){
        return q.prompt;
      }),

      i18n: (function(){
        ensureI18nShape();
        return {
          ui: _i18n.ui || {},
          survey: _i18n.survey || {},
          questions: Array.isArray(_i18n.questions) ? _i18n.questions : []
        };
      })(),
      embed_config: (window._embedCfg && typeof window._embedCfg === 'object')
        ? Object.assign({}, window._embedCfg)
        : ((_survey && _survey.embed_config && typeof _survey.embed_config === 'object') ? _survey.embed_config : {})
    };

    var resultId;
    try {
      resultId = await GoNoGoAPI.cx.upsertSurvey(payload);
    } catch (err) {
      var msg = (err && err.message) || '';
      // Retry once with a unique slug suffix if we hit the unique constraint
      if (/duplicate key|already exists|23505/i.test(msg)) {
        var suffix = '-' + Math.random().toString(36).slice(2, 6);
        payload.slug = ((payload.slug || payload.name || 'survey').toString().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')) + suffix;
        resultId = await GoNoGoAPI.cx.upsertSurvey(payload);
      } else {
        throw err;
      }
    }

    var id = (_survey && _survey.id) || resultId;
    // Establish _survey/_surveyId immediately so the rest of the UI knows we have a saved record,
    // even if the follow-up getSurvey call fails (network/auth blip won't hide the fact that save succeeded).
    if (id) {
      _survey = _survey || {};
      _survey.id = id;
      _surveyId = id;
      try {
        var data = await GoNoGoAPI.cx.getSurvey(id);
        if (data && data.survey) {
          _survey = data.survey;
          _surveyId = _survey.id;
          _questions = (data.questions || []).map(function(q){
            var cj = q.content_json || {};
            return {
              qtype: q.qtype,
              prompt: q.prompt || '',
              help_text: q.help_text || q.helptext || '',
              required: !!q.required,
              options: q.options || [],
              logic: q.logic || q.logic_rules || [],
              formatting: (cj && typeof cj.formatting === 'object' && cj.formatting) ? cj.formatting : {},
              image_url: (cj && cj.image_url) || ''
            };
          });
          _links = data.links || [];
          if (_survey && _survey.i18n && typeof _survey.i18n === 'object') {
            _i18n = {
              ui: _survey.i18n.ui || {},
              survey: _survey.i18n.survey || {},
              questions: Array.isArray(_survey.i18n.questions) ? _survey.i18n.questions : []
            };
          }
        }
      } catch(reloadErr) {
        // Don't fail save just because reload failed; _survey.id is already set.
        console.warn('Survey saved but reload failed:', reloadErr);
      }
    }

    if (id && !window.location.search.includes('id=')) {
      history.replaceState(null, '', 'brand-cx-survey-edit.html?id=' + id);
    }

    document.getElementById('title-text').textContent = 'Edit: ' + (_survey.name || 'Survey');
    document.getElementById('tab-links').style.display = '';
    updateStatusUI();
    renderRail();
    renderQuestionPanel();
    renderLinks();
    _dirty = false;
    toast('Survey saved', 'success');
  } catch(e) {
    toast('Save failed: ' + (e.message || 'error'), 'error');
  } finally {
    _saving = false;
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-save"></i> Save';
  }
}

function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'se-toast ' + (type || 'success') + ' show';
  clearTimeout(el.t);
  el.t = setTimeout(function(){
    el.classList.remove('show');
  }, 3000);
}
</script>
</body>
</html>
